#####################################################################
# 	Temperature Sensor Settings
#####################################################################

[heater_bed]
##  SSR Pin - HE3
##  Thermistor - TB
heater_pin: PB11
sensor_type: Generic 3950
sensor_pin: PF3
max_power: 0.8
min_temp: 0
max_temp: 120
control = pid

[temperature_sensor shitty]
sensor_type: temperature_mcu
sensor_mcu: sht

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: -40
max_temp: 110

[temperature_sensor chamber]
sensor_type: PT1000
sensor_pin: PF4
min_temp: 0
max_temp: 100
gcode_id: chamber_th
