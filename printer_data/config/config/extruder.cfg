[extruder]
control: mpc
heater_power: 27  
cooling_fan: fan
filament_diameter: 1.75
filament_density: 1.20
filament_heat_capacity: 1.8 
nozzle_diameter: 0.400
step_pin: sht:EXT_STEP
dir_pin: !sht:EXT_DIR
enable_pin: !sht:EXT_EN
rotation_distance: 21.5450025
gear_ratio: 50:8 
microsteps: 16
full_steps_per_rotation: 200
max_extrude_only_velocity: 50.0
max_extrude_only_accel: 1500
heater_pin: sht:HE0
sensor_pin: sht:TH0
sensor_type: ATC Semitec 104NT-4-R025H42G # this is the default for the Revo heater
pullup_resistor: 4700           # No jumper=4700 ohms for NTC thermistor. Add jumper to set to 1100 ohms for PT1000 thermistor.
min_temp: 0
max_temp: 275
min_extrude_temp: 160
max_extrude_only_distance: 200
max_extrude_cross_section: 50

[tmc2209 extruder]
uart_pin: sht:EXT_UART
diag_pin: sht:EXT_DIAG
run_current: 0.30
sense_resistor: 0.110
interpolate: false