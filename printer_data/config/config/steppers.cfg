#####################################################################
#   Config Constants
#####################################################################

[constants]
run_current_xy: 0.919
home_current_xy: 0.5
driver_tbl_xy: 1
driver_toff_xy: 3
driver_hsrt_xy: 3
driver_hend_xy: 3
interpolate_xy: false 
driver_sgthrs_x: 99
driver_sgthrs_y: 90

#run_current_z:  0.707
#interpolate_z: false
#stealthchop_z: 999999

#####################################################################
#   Autotune settings
#####################################################################

[autotune_tmc stepper_z]
motor: omc-17hs15-1504s
[autotune_tmc stepper_z1]
motor: omc-17hs15-1504s
[autotune_tmc stepper_z2]
motor: omc-17hs15-1504s

#####################################################################
#      X/Y Stepper Settings
#####################################################################

[stepper_x]
step_pin: PG0
dir_pin: PG1
enable_pin: !PF15
endstop_pin: tmc2209_stepper_x:virtual_endstop
position_endstop: 273
position_min: -15
position_max: 273
homing_speed: 80
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 32
homing_positive_dir: true
use_sensorless_homing: true
homing_retract_dist: 5
homing_retract_speed: 20
min_home_dist: 40

[tmc2209 stepper_x]
uart_pin: PD11
diag_pin: ^PG9
sense_resistor: 0.110
current_change_dwell_time: 0.2
interpolate: ${constants.interpolate_xy}
run_current: ${constants.run_current_xy}
home_current: ${constants.home_current_xy}
driver_TBL: ${constants.driver_tbl_xy}
driver_TOFF: ${constants.driver_toff_xy}
driver_HSTRT: ${constants.driver_hsrt_xy}
driver_HEND: ${constants.driver_hend_xy}
driver_SGTHRS: ${constants.driver_sgthrs_x}

[stepper_y]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
endstop_pin: tmc2209_stepper_y:virtual_endstop
position_endstop: 255
position_min: 0
position_max: 255
homing_speed: 50
rotation_distance: 40
full_steps_per_rotation: 200
microsteps: 32
homing_positive_dir: true
use_sensorless_homing: true
homing_retract_dist: 5
homing_retract_speed: 20
min_home_dist: 40

[tmc2209 stepper_y]
uart_pin: PC4
diag_pin: ^PG6
sense_resistor: 0.110
current_change_dwell_time: 0.2
interpolate: ${constants.interpolate_xy}
run_current: ${constants.run_current_xy}
home_current: ${constants.home_current_xy}
driver_TBL: ${constants.driver_tbl_xy}
driver_TOFF: ${constants.driver_toff_xy}
driver_HSTRT: ${constants.driver_hsrt_xy}
driver_HEND: ${constants.driver_hend_xy}
driver_SGTHRS: ${constants.driver_sgthrs_y}

#####################################################################
#   Z Stepper Settings
#####################################################################
##  Z1 Stepper - Front Left
##  Connected to MOTOR_4
[stepper_z]
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
endstop_pin: probe:z_virtual_endstop # Beacon probe Z endstop
#position_endstop: 0
position_max: 300
position_min: -5
rotation_distance: 8
microsteps: 32
homing_retract_dist: 0

[tmc2209 stepper_z]
uart_pin: PF2
run_current: 0.60
interpolate: False
sense_resistor: 0.110

##  Z1 Stepper - Rear
##  Connected to MOTOR_6
[stepper_z1]
step_pin: PE2
dir_pin: !PE3
enable_pin: !PD4
rotation_distance: 8
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PE1
run_current: 0.60
interpolate: False
sense_resistor: 0.110

##  Z2 Stepper - Front Right
##  Connected to MOTOR_5
[stepper_z2]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 8
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PE4
run_current: 0.60
interpolate: False
sense_resistor: 0.110


